<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ส่งคำขอใช้งานนอกเวลา</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <script src="config.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    body { background: #f8f7ff; font-family: 'Sarabun', sans-serif; padding: 20px; }
    .card { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .btn-primary { background-color: #9d85e1; border: none; border-radius: 12px; padding: 12px; }
    .btn-primary:hover { background-color: #7a61c5; }
  </style>
</head>
<body onload="initPage()">

  <div class="container" style="max-width: 500px;">
    <div class="card p-4 mt-3">
      <h4 class="fw-bold text-center mb-4">📝 ส่งคำขอใช้งานนอกเวลา</h4>
      
      <div id="userProfile" class="d-none alert alert-light border mb-3">
        <h6 id="dispName" class="fw-bold mb-1"></h6>
        <small id="dispPhone" class="text-muted d-block"></small>
        <small id="dispRole" class="text-muted"></small>
      </div>

      <div class="mb-3">
        <label class="form-label">ระบุห้องที่เข้าใช้งาน</label>
        <input type="text" id="requestRoom" class="form-control" placeholder="เช่น ห้องประชุม 1">
      </div>

      <div class="mb-3">
        <label class="form-label">วันที่คาดว่าจะคืน</label>
        <input type="date" id="returnDate" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">หมายเหตุ / วัตถุประสงค์</label>
        <textarea id="requestNote" class="form-control" rows="3" placeholder="ระบุเหตุผลการใช้งาน"></textarea>
      </div>

      <button onclick="submitRequest()" class="btn btn-primary w-100 mb-2">ส่งคำขอ</button>
      <button onclick="liff.closeWindow()" class="btn btn-outline-secondary w-100">ยกเลิก</button>
    </div>
  </div>

  <script>
    // ดึงค่าจาก config.js (ห้ามใส่เครื่องหมายคำพูดครอบ)
    const liffId = CONFIG.LIFF_ID; 
    const GAS_URL = CONFIG.API_ENDPOINT; 
    let lineId = "";
    let currentUser = null;

    async function callGAS(action, data = {}) {
      const response = await fetch(GAS_URL, { 
        method: "POST", 
        body: JSON.stringify({ action, email: lineId, ...data }) 
      });
      return response.json();
    }

    async function initPage() {
      Swal.fire({ title: 'กำลังโหลดข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        await liff.init({ liffId });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        lineId = profile.userId;

        const user = await callGAS("getUserData");
        Swal.close();
        
        if (user) {
          currentUser = user;
          document.getElementById('dispName').textContent = user.name;
          document.getElementById('dispPhone').textContent = "📞 " + user.phone;
          document.getElementById('dispRole').textContent = "บทบาท: " + user.role;
          document.getElementById('userProfile').classList.remove('d-none');
        } else {
          Swal.fire('ไม่พบข้อมูลผู้ใช้', 'กรุณาลงทะเบียนที่หน้าหลักก่อน', 'warning').then(() => liff.closeWindow());
        }
      } catch (err) { 
        Swal.close(); 
        Swal.fire('Error', 'ไม่สามารถเชื่อมต่อระบบได้: ' + err.message, 'error'); 
      }
    }

    async function submitRequest() {
      if (!currentUser) return;
      const room = document.getElementById('requestRoom').value;
      const retDate = document.getElementById('returnDate').value;
      const note = document.getElementById('requestNote').value.trim();

      if (!room || !retDate) return Swal.fire('กรุณากรอกข้อมูลให้ครบ', 'ต้องระบุห้องและวันที่คืน', 'warning');

      Swal.fire({ title: 'กำลังส่งคำขอ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      try {
        const res = await callGAS("processAction", { 
          obj: { 
            id: "OT", 
            name: currentUser.name, 
            phone: currentUser.phone, 
            role: currentUser.role, 
            room: room, 
            returnDate: retDate, 
            note: note, 
            action: "ยืมนอกเวลา" 
          } 
        });

        Swal.close();
        if (res === "OK") {
          Swal.fire('สำเร็จ', 'ส่งคำขอเรียบร้อยแล้ว', 'success').then(() => liff.closeWindow());
        } else {
          Swal.fire('ผิดพลาด', 'ไม่สามารถส่งคำขอได้ในขณะนี้', 'error');
        }
      } catch (e) {
        Swal.fire('Error', 'เกิดข้อผิดพลาดในการส่งข้อมูล', 'error');
      }
    }
  </script>
</body>
</html>
