<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ขอยืมอุปกรณ์นอกเวลา</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
        body { background-color: #f0f2f5; font-family: 'Sarabun', sans-serif; padding: 15px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 8px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header-banner { background: linear-gradient(135deg, #7a61c5, #9d85e1); color: white; padding: 25px; text-align: center; }
        .btn-purple { background-color: #7a61c5; color: white; border-radius: 12px; padding: 12px; font-weight: bold; border: none; width: 100%; }
        .info-box { background: #fff9db; border-left: 5px solid #fcc419; padding: 15px; border-radius: 8px; font-size: 0.85rem; color: #664d03; margin-bottom: 20px; }
        .highlight { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card w-100" style="max-width: 450px;">
            <div class="header-banner">
                <h4 class="fw-bold mb-0">📝 ขอยืมอุปกรณ์นอกเวลา</h4>
            </div>
            <div class="p-4">
                <div class="info-box">
                    <strong>📢 กฎการยืมนอกเวลา:</strong><br>
                    • <span class="highlight">รับอุปกรณ์เวลา 16:00-16:30 น.</span> ของวันก่อนเข้าใช้งาน<br>
                    • หลังใช้งาน: ให้เก็บไว้ในห้องบรรยาย เจ้าหน้าที่จะตามไปรับเอง
                </div>

                <div id="loading" class="text-center">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">กำลังโหลดข้อมูล...</p>
                </div>

                <form id="requestForm" class="d-none">
                    <div class="mb-3">
                        <label class="form-label fw-bold">ชื่อ-นามสกุล</label>
                        <input type="text" id="userName" class="form-control bg-light" readonly>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">เลือกชั้น</label>
                            <select id="floor" class="form-select" onchange="updateItems()">
                                <option value="">-- ชั้น --</option>
                                <option value="1">ชั้น 1</option>
                                <option value="2">ชั้น 2</option>
                            </select>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">เลือกห้องบรรยาย</label>
                            <select id="itemId" class="form-select">
                                <option value="">-- เลือกชั้นก่อน --</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">วันและเวลาที่จะเข้าใช้งาน</label>
                        <input type="datetime-local" id="usageTime" class="form-control">
                    </div>

                    <button type="button" onclick="submitRequest()" class="btn btn-purple mt-3">ส่งคำขออนุมัติ</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009184396-t5vJHbvQ"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwgsV2B-36BDdsiKjFtgHYH_ZVyahwelzJCVi2QiLr7VrzaAZa8TpQGJU7yW3IoD_tPHQ/exec";
        let userLineId = "";

        // ข้อมูลอ้างอิงตามรูป Screenshot (ID, ชั้น, ห้อง)
        const inventoryData = [
            { id: "F1-R1", floor: "1", room: "บรรยาย 1" },
            { id: "F1-R2", floor: "1", room: "บรรยาย 2" },
            { id: "F1-R3", floor: "1", room: "บรรยาย 3" },
            { id: "F2-R1", floor: "2", room: "บรรยาย 1" },
            { id: "F2-R2", floor: "2", room: "บรรยาย 2" },
            { id: "F2-R3", floor: "2", room: "บรรยาย 3" },
            { id: "F2-R4", floor: "2", room: "บรรยาย 4" }
        ];

        function updateItems() {
            const floor = document.getElementById('floor').value;
            const itemSelect = document.getElementById('itemId');
            itemSelect.innerHTML = '<option value="">-- เลือกห้อง --</option>';
            
            inventoryData.filter(item => item.floor === floor).forEach(item => {
                let opt = document.createElement('option');
                opt.value = item.id;
                opt.innerHTML = `${item.id} (${item.room})`;
                itemSelect.appendChild(opt);
            });
        }

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); } 
                else {
                    const profile = await liff.getProfile();
                    userLineId = profile.userId;
                    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getUserData", email: userLineId }) });
                    const userData = await res.json();
                    if (userData) {
                        document.getElementById('userName').value = userData.name;
                        document.getElementById('loading').classList.add('d-none');
                        document.getElementById('requestForm').classList.remove('d-none');
                    } else {
                        Swal.fire("ไม่พบข้อมูล", "โปรดลงทะเบียนก่อน", "error").then(() => liff.closeWindow());
                    }
                }
            } catch (err) { console.error(err); }
        }

        async function submitRequest() {
            const itemId = document.getElementById('itemId').value;
            const time = document.getElementById('usageTime').value;
            if (!itemId || !time) { Swal.fire("เตือน", "กรุณาระบุข้อมูลให้ครบ", "warning"); return; }

            Swal.fire({ title: 'กำลังส่งคำขอ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "requestOT",
                        email: userLineId,
                        data: { 
                            name: document.getElementById('userName').value, 
                            itemId: itemId, 
                            usageTime: time.replace('T', ' ') 
                        }
                    })
                });
                const result = await res.json();
                if (result.status === "SUCCESS") {
                    Swal.fire("สำเร็จ!", "กรุณามารับอุปกรณ์ช่วงเวลา 16:00-16:30 น.", "success").then(() => liff.closeWindow());
                }
            } catch (err) { Swal.fire("Error", "เกิดข้อผิดพลาด", "error"); }
        }
        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
