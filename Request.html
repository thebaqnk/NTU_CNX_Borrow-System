<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ขอยืมอุปกรณ์นอกเวลา</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
        body { background-color: #f8f7ff; font-family: 'Sarabun', sans-serif; padding: 20px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 20px rgba(157, 133, 225, 0.1); }
        .btn-purple { background-color: #9d85e1; color: white; border-radius: 12px; padding: 12px; font-weight: bold; border: none; width: 100%; }
        .btn-purple:hover { background-color: #7a61c5; color: white; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card p-4 w-100" style="max-width: 450px;">
            <h4 class="fw-bold text-center mb-4" style="color: #7a61c5;">📝 ขอยืมอุปกรณ์นอกเวลา</h4>
            
            <div id="loading" class="text-center">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">กำลังโหลดข้อมูลโปรไฟล์...</p>
            </div>

            <form id="requestForm" class="d-none">
                <div class="mb-3">
                    <label class="form-label fw-bold">ชื่อ-นามสกุล</label>
                    <input type="text" id="userName" class="form-control" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">ระบุอุปกรณ์ที่ต้องการยืม</label>
                    <textarea id="itemDetail" class="form-control" rows="3" placeholder="ระบุชื่ออุปกรณ์ และรหัส (ถ้าทราบ)"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">เหตุผลการยืม</label>
                    <input type="text" id="reason" class="form-control" placeholder="เช่น ทำโครงงาน, กิจกรรมภาควิชา">
                </div>
                <button type="button" onclick="submitRequest()" class="btn btn-purple">ส่งคำขออนุมัติ</button>
            </form>
        </div>
    </div>

    <script>
        // --- ฝังค่าจริง (Hardcoded) ---
        const LIFF_ID = "2009184396-t5vJHbvQ"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwgsV2B-36BDdsiKjFtgHYH_ZVyahwelzJCVi2QiLr7VrzaAZa8TpQGJU7yW3IoD_tPHQ/exec";

        let userProfile = {};

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    userProfile = profile;
                    
                    // ดึงชื่อจาก GAS มาโชว์
                    const response = await fetch(GAS_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "getUserData", email: profile.userId })
                    });
                    const userData = await response.json();
                    
                    if (userData) {
                        document.getElementById('userName').value = userData.name;
                        document.getElementById('loading').classList.add('d-none');
                        document.getElementById('requestForm').classList.remove('d-none');
                    } else {
                        Swal.fire("ไม่พบข้อมูล", "กรุณาลงทะเบียนผ่านหน้าหลักก่อน", "warning").then(() => {
                            liff.closeWindow();
                        });
                    }
                }
            } catch (err) {
                console.error(err);
                Swal.fire("Error", "เกิดข้อผิดพลาดในการโหลดข้อมูล", "error");
            }
        }

        async function submitRequest() {
            const detail = document.getElementById('itemDetail').value;
            const reason = document.getElementById('reason').value;

            if (!detail || !reason) {
                Swal.fire("เตือน", "กรุณากรอกข้อมูลให้ครบถ้วน", "warning");
                return;
            }

            Swal.fire({ title: 'กำลังส่งคำขอ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "requestOT",
                        email: userProfile.userId,
                        detail: detail,
                        reason: reason
                    })
                });
                const result = await response.json();

                if (result.status === "SUCCESS") {
                    Swal.fire("สำเร็จ!", "ส่งคำขอเรียบร้อยแล้ว โปรดรอการอนุมัติ", "success").then(() => {
                        liff.closeWindow();
                    });
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                Swal.fire("ผิดพลาด", "ไม่สามารถส่งคำขอได้: " + err.message, "error");
            }
        }

        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
