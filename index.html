<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ระบบยืม-คืนอุปกรณ์</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    :root { --p-purple: #9d85e1; --l-purple: #f3f0ff; --d-purple: #7a61c5; --soft-bg: #f8f7ff; }
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: var(--soft-bg); font-family: 'Sarabun', sans-serif; overflow-x: hidden; }
    body { padding: 15px; display: flex; align-items: center; justify-content: center; }
    .card { width: 100%; max-width: 420px; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(157, 133, 225, 0.15); border: none; }
    .info-header { background: var(--p-purple); color: white; padding: 20px 15px; border-radius: 18px; margin-bottom: 20px; text-align: center; }
    .btn-purple { background: var(--p-purple); color: white; width: 100%; padding: 16px; border-radius: 14px; font-weight: bold; margin-top: 10px; border: none; font-size: 1.1rem; transition: 0.2s; }
    .btn-purple:active { transform: scale(0.98); opacity: 0.9; }
    .profile-box { background: var(--l-purple); border: 1px solid #e1d9ff; padding: 18px; border-radius: 15px; }
    .spinner { width: 3.5rem; height: 3.5rem; border: 5px solid var(--l-purple); border-top: 5px solid var(--p-purple); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .d-none { display: none !important; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loadingScreen" class="text-center">
      <div class="spinner"></div>
      <p class="text-muted fw-bold">กำลังเชื่อมต่อระบบ...</p>
    </div>

    <div id="contentArea" class="d-none">
      <div id="pageHeader"></div>

      <div id="profileBox" class="profile-box mb-3 d-none">
        <div class="fw-bold" style="color: var(--d-purple)" id="uNameDisp"></div>
        <div class="small text-muted" id="uPhoneDisp"></div>
        <div id="verifyStatus" class="mt-2"></div>
        <button class="btn btn-sm btn-link p-0 mt-1 text-decoration-none" style="color: var(--p-purple)" onclick="showForm()">⚙️ แก้ไขข้อมูล</button>
      </div>

      <div id="regForm" class="d-none">
        <h6 class="fw-bold mb-3">ลงทะเบียนผู้ใช้</h6>
        <select id="uRole" class="form-select mb-2"><option>นักศึกษา</option><option>อาจารย์</option><option>บุคลากร</option></select>
        <input type="text" id="uName" class="form-control mb-2" placeholder="ชื่อ">
        <input type="tel" id="uPhone" class="form-control mb-3" placeholder="เบอร์โทรศัพท์">
        <button onclick="saveUser()" class="btn btn-purple">บันทึกและใช้งาน</button>
      </div>

      <div id="actionArea" class="d-none"></div>
    </div>
  </div>

<script>
  const GAS_URL = "GAS_API"; //Private_URL 
  const LIFF_ID = "LIFF_ID"; //Private_URL  
  let sys = { 
    id: new URLSearchParams(window.location.search).get('id') || "", 
    mode: new URLSearchParams(window.location.search).get('mode') || "main",
    email: "" 
  };

  async function callGAS(action, data = {}) {
    try {
      const response = await fetch(GAS_URL, { 
        method: "POST", 
        body: JSON.stringify({ action, email: sys.email, ...data }) 
      });
      return await response.json();
    } catch (err) {
      console.error("GAS Error:", err);
      return null;
    }
  }

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      sys.email = profile.userId;

      if (sys.mode === "history") { renderHistory(); return; } 

      const [info, user, verified] = await Promise.all([
        callGAS("getInventoryData", { id: sys.id }),
        callGAS("getUserData"),
        callGAS("checkVerifyStatus")
      ]);

      renderMain(info, user, verified);
    } catch (e) { 
        Swal.fire("Error", "โหลดข้อมูลไม่สำเร็จ กรุณาตรวจสอบการเชื่อมต่อ", "error"); 
    }
  }

  function renderMain(info, user, verified) {
    document.getElementById('loadingScreen').classList.add('d-none');
    document.getElementById('contentArea').classList.remove('d-none');

    let headerHtml = info.type === "POINT" 
      ? `<div class="text-center mb-3"><div style="font-size:3rem">📍</div><h5 class="fw-bold">จุดคืนอุปกรณ์</h5><div class="alert alert-info py-2 small">${info.room}</div></div>`
      : `<div class="info-header"><h5 class="mb-1">ชั้น ${info.floor} - ห้อง ${info.room}</h5><small>ID: ${info.id}</small></div>`;
    document.getElementById('pageHeader').innerHTML = headerHtml;

    if (user) {
      document.getElementById('uNameDisp').innerText = user.name + " (" + user.role + ")";
      document.getElementById('uPhoneDisp').innerText = "📞 " + user.phone;
      document.getElementById('profileBox').classList.remove('d-none');
      document.getElementById('actionArea').classList.remove('d-none');
      
      let actionHtml = "";
      if (info.type === "POINT") {
        actionHtml = `<button onclick="doVerify()" class="btn btn-purple">เช็คอินที่นี่</button>`;
      } else {
        if (info.status.includes("ยืม")) {
          actionHtml = verified 
            ? `<button onclick="doAction('คืนอุปกรณ์')" class="btn btn-purple" style="background:#6c5ce7">ยืนยันการคืน</button>`
            : `<div class="alert alert-danger small text-center">กรุณาสแกนจุดคืนก่อน</div>`;
        } else {
          actionHtml = `<button onclick="doAction('ยืมอุปกรณ์')" class="btn btn-purple">ยืนยันการยืม</button>`;
        }
      }
      document.getElementById('actionArea').innerHTML = actionHtml;
      document.getElementById('verifyStatus').innerHTML = info.status.includes("ยืม") ? `<span class="badge ${verified ? 'bg-success' : 'bg-secondary'}">${verified ? 'เช็คอินแล้ว' : 'ยังไม่เช็คอิน'}</span>` : "";
    } else {
      document.getElementById('regForm').classList.remove('d-none');
    }
  }

  async function doVerify() {
    Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
    const res = await callGAS("recordVerify", { id: sys.id });
    if(res === "SUCCESS") {
        window.location.href = "VerifySuccess.html"; // ไปหน้าเช็คอินสำเร็จ
    } else {
        Swal.fire('ผิดพลาด', 'ไม่สามารถบันทึกได้', 'error');
    }
  }

  async function doAction(act) {
    Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
    const user = await callGAS("getUserData");
    const res = await callGAS("processAction", { obj: { id: sys.id, action: act, name: user.name, phone: user.phone, role: user.role } });
    
    if(res === "OK") {
        if (act === "ยืมอุปกรณ์") {
            window.location.href = "BorrowSuccess.html"; // ไปหน้ายืมสำเร็จ
        } else {
            window.location.href = "ReturnSuccess.html"; // ไปหน้าคืนสำเร็จ
        }
    } else {
        Swal.fire('ผิดพลาด', 'บันทึกไม่สำเร็จ', 'error');
    }
  }

  async function saveUser() {
    const data = { 
        name: document.getElementById('uName').value, 
        phone: document.getElementById('uPhone').value, 
        role: document.getElementById('uRole').value 
    };
    if(!data.name || !data.phone) { Swal.fire('เตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning'); return; }
    
    Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
    const res = await callGAS("saveUserData", { data });
    if(res === "SUCCESS") {
        location.reload(); 
    } else {
        Swal.fire('ผิดพลาด', 'ลงทะเบียนไม่สำเร็จ', 'error');
    }
  }

  function showForm() {
    document.getElementById('profileBox').classList.add('d-none');
    document.getElementById('actionArea').classList.add('d-none');
    document.getElementById('regForm').classList.remove('d-none');
  }

  document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
