<!DOCTYPE html> 
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ระบบยืม-คืนอุปกรณ์</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    :root { --p-purple: #9d85e1; --l-purple: #f3f0ff; --d-purple: #7a61c5; --soft-bg: #f8f7ff; }
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: var(--soft-bg); font-family: 'Sarabun', sans-serif; overflow-x: hidden; }
    body { padding: 15px; display: flex; align-items: center; justify-content: center; }
    .card { width: 100%; max-width: 420px; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(157, 133, 225, 0.15); border: none; }
    
    /* --- Emoji Loading Style (No Spinner) --- */
    .emoji-load { 
      font-size: 90px; 
      display: block; 
      margin: 20px auto; 
      height: 120px; 
      line-height: 120px; 
      animation: dance 0.8s infinite alternate ease-in-out; 
    }
    @keyframes dance { 
      from { transform: rotate(-15deg) scale(1.1); } 
      to { transform: rotate(15deg) scale(1.1); } 
    }

    .d-none { display: none !important; }
    .version-text { font-size: 0.7rem; color: #ccc; text-align: center; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loadingScreen" class="text-center">
      <div id="emojiDisplay" class="emoji-load">📚</div>
      <p id="statusText" class="text-muted fw-bold">กำลังเตรียมข้อมูลอุปกรณ์...</p>
    </div>

    <div id="contentArea" class="d-none">
      <div id="pageHeader"></div>
      <div id="profileBox" class="profile-box mb-3 d-none" style="background: var(--l-purple); border: 1px solid #e1d9ff; padding: 18px; border-radius: 15px;">
        <div class="fw-bold" style="color: var(--d-purple)" id="uNameDisp"></div>
        <div class="small text-muted" id="uPhoneDisp"></div>
        <div id="verifyStatus" class="mt-2"></div>
        <button class="btn btn-sm btn-link p-0 mt-1 text-decoration-none" style="color: var(--p-purple)" onclick="showForm()">⚙️ แก้ไขข้อมูล</button>
      </div>
      <div id="regForm" class="d-none">
        <h6 class="fw-bold mb-3">ลงทะเบียนผู้ใช้</h6>
        <select id="uRole" class="form-select mb-2">
          <option>นักศึกษา</option>
          <option>อาจารย์</option>
          <option>บุคลากร</option>
        </select>
        <input type="text" id="uName" class="form-control mb-2" placeholder="ชื่อ-นามสกุล">
        <input type="tel" id="uPhone" class="form-control mb-3" placeholder="เบอร์โทรศัพท์">
        <button onclick="saveUser()" class="btn btn-purple" style="background: var(--p-purple); color: white; width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold;">บันทึกและใช้งาน</button>
      </div>
      <div id="actionArea" class="d-none"></div>
      <div class="version-text">v1.3.9 (Clean Emoji Load)</div>
    </div>
  </div>

<script>
  const LIFF_ID = "2009184396-t5vJHbvQ"; 
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwgsV2B-36BDdsiKjFtgHYH_ZVyahwelzJCVi2QiLr7VrzaAZa8TpQGJU7yW3IoD_tPHQ/exec";

  let sys = { id: new URLSearchParams(window.location.search).get('id') || "", email: "" };

  // --- สลับ Emoji ช้าลงเป็น 1 วินาที (1000ms) ---
  const emojis = ["📚", "📓", "✏️", "🎤", "📢"];
  let emojiIdx = 0;
  setInterval(() => {
    const el = document.getElementById('emojiDisplay');
    if (el) {
      emojiIdx = (emojiIdx + 1) % emojis.length;
      el.innerText = emojis[emojiIdx];
    }
  }, 1000); 

  async function callGAS(action, data = {}) {
    try {
      const response = await fetch(GAS_URL, { 
        method: "POST", 
        body: JSON.stringify({ action, email: sys.email, ...data }) 
      });
      return await response.json();
    } catch (err) { return null; }
  }

  async function init() {
    const statusText = document.getElementById('statusText');
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      sys.email = profile.userId;
      const [info, user, verified] = await Promise.all([
        callGAS("getInventoryData", { id: sys.id }),
        callGAS("getUserData"),
        callGAS("checkVerifyStatus")
      ]);
      if (!info) throw new Error("ไม่พบข้อมูลอุปกรณ์");
      renderMain(info, user, verified);
    } catch (e) { statusText.innerHTML = `เกิดข้อผิดพลาด: ${e.message}`; }
  }

  function renderMain(info, user, verified) {
    document.getElementById('loadingScreen').classList.add('d-none');
    document.getElementById('contentArea').classList.remove('d-none');
    let headerHtml = info.type === "POINT" 
      ? `<div class="text-center mb-3"><div style="font-size:3rem">📍</div><h5 class="fw-bold">จุดคืนอุปกรณ์</h5><div class="alert alert-info py-2 small">${info.room}</div></div>`
      : `<div style="background: var(--p-purple); color: white; padding: 20px 15px; border-radius: 18px; margin-bottom: 20px; text-align: center;"><h5 class="mb-1">ชั้น ${info.floor} - ห้อง ${info.room}</h5><small>ID: ${info.id}</small></div>`;
    document.getElementById('pageHeader').innerHTML = headerHtml;
    if (user) {
      document.getElementById('uNameDisp').innerText = user.name + " (" + user.role + ")";
      document.getElementById('uPhoneDisp').innerText = "📞 " + user.phone;
      document.getElementById('profileBox').classList.remove('d-none');
      document.getElementById('actionArea').classList.remove('d-none');
      let actionHtml = info.type === "POINT" ? `<button onclick="doVerify()" class="btn" style="background: var(--p-purple); color: white; width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold;">เช็คอินที่นี่</button>` : (info.status && info.status.includes("ยืม") ? (verified ? `<button onclick="doAction('คืนอุปกรณ์')" class="btn" style="background:#6c5ce7; color: white; width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold;">ยืนยันการคืน</button>` : `<div class="alert alert-danger small text-center mb-0">กรุณาสแกนจุดคืนก่อน</div>`) : `<button onclick="doAction('ยืมอุปกรณ์')" class="btn" style="background: var(--p-purple); color: white; width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold;">ยืนยันการยืม</button>`);
      document.getElementById('actionArea').innerHTML = actionHtml;
      document.getElementById('verifyStatus').innerHTML = (info.status && info.status.includes("ยืม")) ? `<span class="badge ${verified ? 'bg-success' : 'bg-secondary'}">${verified ? 'เช็คอินแล้ว' : 'ยังไม่เช็คอิน'}</span>` : "";
    } else { document.getElementById('regForm').classList.remove('d-none'); }
  }

  async function doVerify() {
    Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    const res = await callGAS("recordVerify", { id: sys.id });
    if(res && res.status === "SUCCESS") { window.location.href = "VerifySuccess.html"; }
    else { Swal.fire('ผิดพลาด', 'ไม่สำเร็จ', 'error'); }
  }

  async function doAction(act) {
    Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    const user = await callGAS("getUserData");
    const res = await callGAS("processAction", { obj: { id: sys.id, action: act, name: user.name, phone: user.phone, role: user.role } });
    if(res && res.status === "SUCCESS") { window.location.href = (act === "ยืมอุปกรณ์") ? "BorrowSuccess.html" : "ReturnSuccess.html"; }
    else { Swal.fire('ผิดพลาด', 'ไม่สำเร็จ', 'error'); }
  }

  async function saveUser() {
    const data = { name: document.getElementById('uName').value, phone: document.getElementById('uPhone').value, role: document.getElementById('uRole').value };
    if(!data.name || !data.phone) { Swal.fire('เตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning'); return; }
    Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    const res = await callGAS("saveUserData", { data });
    if(res && res.status === "SUCCESS") { location.reload(); }
    else { Swal.fire('ผิดพลาด', 'ไม่สำเร็จ', 'error'); }
  }

  function showForm() {
    document.getElementById('profileBox').classList.add('d-none');
    document.getElementById('actionArea').classList.add('d-none');
    document.getElementById('regForm').classList.remove('d-none');
  }

  document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
