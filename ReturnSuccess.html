<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif;">
  <div class="text-center p-5 bg-white rounded-5 shadow" style="max-width:400px; width:90%;">
    <h1 style="font-size: 80px;">✅</h1>
    <h2 class="fw-bold text-success">คืนสำเร็จ</h2>
    <p class="text-muted">ขอบคุณที่ช่วยดูแลรักษาอุปกรณ์</p>
    <br>
    <button onclick="closeLiff()" class="btn btn-outline-secondary w-100">ปิดหน้าต่าง</button>
  </div>
  <script>
    async function closeLiff() {
      await liff.init({ liffId: "LIFF_ID" }); //Private_URL
      liff.closeWindow();
    }
  </script>
</body>
</html>
