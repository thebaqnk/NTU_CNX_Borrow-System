<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Admin Dashboard - NTU</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    :root { --p-purple: #9d85e1; --soft-bg: #f8f7ff; }
    body { font-family: 'Sarabun', sans-serif; background: var(--soft-bg); padding: 15px; }
    .card-custom { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: none; margin-bottom: 15px; }
    .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .bg-ready { background-color: #28a745; }
    .bg-borrowed { background-color: #dc3545; }
    .history-row { cursor: pointer; transition: 0.2s; }
    .history-row:active { background-color: #f0f0f0; }
    .user-name { font-size: 0.75rem; color: #6c757d; }
    .modal-content { border-radius: 20px; border: none; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row g-2 mb-3">
      <div class="col-6">
        <div class="card-custom text-center p-3">
          <small class="text-muted d-block mb-1">ว่างพร้อมใช้</small>
          <h3 class="fw-bold text-success m-0" id="sumReady">-</h3>
        </div>
      </div>
      <div class="col-6">
        <div class="card-custom text-center p-3">
          <small class="text-muted d-block mb-1">กำลังถูกยืม</small>
          <h3 class="fw-bold text-danger m-0" id="sumBorrowed">-</h3>
        </div>
      </div>
    </div>

    <div class="card-custom">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="fw-bold m-0">📋 รายการอุปกรณ์</h6>
        <button onclick="loadAdminData()" class="btn btn-sm btn-light text-primary">🔄 รีเฟรช</button>
      </div>
      <div id="inventoryList">
        <div class="text-center p-4 text-muted small">กำลังโหลดข้อมูล...</div>
      </div>
    </div>

    <div class="card-custom">
      <h6 class="fw-bold mb-3">🕒 ประวัติ (คลิกเพื่อดูรายละเอียด)</h6>
      <div class="table-responsive">
        <table class="table table-sm table-hover border-top m-0">
          <tbody id="historyList">
            <tr><td class="text-center py-4 text-muted small">กำลังดึงข้อมูลประวัติ...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content shadow">
        <div class="modal-body text-center p-4">
          <div class="mb-3 text-primary"><i class="fas fa-user-circle fa-3x"></i></div>
          <h5 class="fw-bold mb-1" id="modalName">-</h5>
          <p class="text-muted small mb-3" id="modalRole">-</p>
          <hr>
          <div class="text-start mb-3">
            <small class="text-muted d-block">เบอร์โทรศัพท์:</small>
            <span class="fw-bold" id="modalPhone">-</span>
          </div>
          <div class="text-start mb-3">
            <small class="text-muted d-block">Line ID / Email:</small>
            <span class="small" id="modalLine" style="word-break: break-all;">-</span>
          </div>
          <button type="button" class="btn btn-secondary w-100 rounded-pill" data-bs-dismiss="modal">ปิดหน้าต่าง</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const LIFF_ID = "2009184396-CWSjU5hZ"; 
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwgsV2B-36BDdsiKjFtgHYH_ZVyahwelzJCVi2QiLr7VrzaAZa8TpQGJU7yW3IoD_tPHQ/exec";
  let historyData = [];

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      loadAdminData();
    } catch (e) { loadAdminData(); }
  }

  async function loadAdminData() {
    try {
      const response = await fetch(`${GAS_URL}?action=getAdminHistory`);
      const data = await response.json();
      historyData = data.history;

      document.getElementById('sumReady').innerText = data.summary.ready;
      document.getElementById('sumBorrowed').innerText = data.summary.borrowed;

      const invContainer = document.getElementById('inventoryList');
      invContainer.innerHTML = "";
      data.items.forEach(item => {
        const isBorrowed = item.status.includes("ยืม");
        invContainer.innerHTML += `
          <div class="d-flex justify-content-between align-items-center mb-2 border-bottom pb-2">
            <div><span class="fw-bold">${item.id}</span> <small class="text-muted ms-1">${item.room}</small></div>
            <div><span class="status-dot ${isBorrowed ? 'bg-borrowed' : 'bg-ready'}"></span><small>${item.status}</small></div>
          </div>`;
      });

      const histContainer = document.getElementById('historyList');
      histContainer.innerHTML = "";
      data.history.forEach((log, index) => {
        const isBorrow = log.action.includes('ยืม');
        histContainer.innerHTML += `
          <tr class="align-middle history-row" onclick="showUserDetail(${index})">
            <td style="width: 25%"><div class="small text-muted">${log.timestamp}</div><div class="fw-bold">${log.itemID}</div></td>
            <td><div class="${isBorrow ? 'text-danger' : 'text-success'} fw-bold">${log.action}</div><div class="user-name">${log.userName}</div></td>
          </tr>`;
      });
    } catch (e) { console.error(e); }
  }

  function showUserDetail(index) {
    const user = historyData[index];
    document.getElementById('modalName').innerText = user.userName;
    document.getElementById('modalRole').innerText = user.userRole;
    document.getElementById('modalPhone').innerText = user.userPhone;
    document.getElementById('modalLine').innerText = user.lineID;
    const myModal = new bootstrap.Modal(document.getElementById('userModal'));
    myModal.show();
  }

  window.onload = init;
</script>
</body>
</html>
