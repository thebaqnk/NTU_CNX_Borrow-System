<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Dashboard - ระบบยืมคืน</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    :root { --p-purple: #9d85e1; --soft-bg: #f8f7ff; }
    body { font-family: 'Sarabun', sans-serif; background: var(--soft-bg); padding: 15px; }
    .stat-card { background: white; border-radius: 18px; padding: 20px; text-align: center; box-shadow: 0 5px 15px rgba(157, 133, 225, 0.1); border: none; }
    .table-container { background: white; border-radius: 18px; padding: 15px; margin-top: 20px; box-shadow: 0 5px 15px rgba(157, 133, 225, 0.1); }
    .status-badge { border-radius: 12px; padding: 4px 10px; font-size: 0.75rem; font-weight: bold; }
    .ready { background: #e3f9e5; color: #1f8b24; }
    .borrowed { background: #fff0f0; color: #d32f2f; }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="fw-bold m-0">📊 สรุปสำหรับเจ้าหน้าที่</h5>
      <button onclick="loadData()" class="btn btn-sm btn-outline-primary" style="border-radius: 10px;">🔄 รีเฟรช</button>
    </div>

    <div class="row g-3">
      <div class="col-6">
        <div class="stat-card">
          <small class="text-muted d-block mb-1">พร้อมใช้งาน</small>
          <h2 class="fw-bold text-success" id="readyCount">0</h2>
        </div>
      </div>
      <div class="col-6">
        <div class="stat-card">
          <small class="text-muted d-block mb-1">ถูกยืม</small>
          <h2 class="fw-bold text-danger" id="borrowedCount">0</h2>
        </div>
      </div>
    </div>

    <div class="table-container">
      <h6 class="fw-bold mb-3">สถานะอุปกรณ์ล่าสุด</h6>
      <div class="table-responsive">
        <table class="table table-sm align-middle" style="font-size: 0.85rem;">
          <thead>
            <tr class="text-muted">
              <th>ID</th>
              <th>ห้อง</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody id="inventoryList">
            <tr><td colspan="3" class="text-center py-4">กำลังโหลดข้อมูล...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const LIFF_ID = "ใส่_LIFF_ID_ใหม่ที่คุณสร้างที่นี่"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwgsV2B-36BDdsiKjFtgHYH_ZVyahwelzJCVi2QiLr7VrzaAZa8TpQGJU7yW3IoD_tPHQ/exec";

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          loadData();
        }
      } catch (err) { console.error(err); }
    }

    async function loadData() {
      try {
        const response = await fetch(`${GAS_URL}?action=getDashboardData`);
        const data = await response.json();

        document.getElementById('readyCount').innerText = data.summary.ready;
        document.getElementById('borrowedCount').innerText = data.summary.borrowed;

        const listBody = document.getElementById('inventoryList');
        listBody.innerHTML = "";

        data.items.forEach(item => {
          const isBorrowed = item.status.includes("ยืม");
          const row = `
            <tr>
              <td class="fw-bold">${item.id}</td>
              <td>${item.room}</td>
              <td><span class="status-badge ${isBorrowed ? 'borrowed' : 'ready'}">${item.status}</span></td>
            </tr>
          `;
          listBody.innerHTML += row;
        });
      } catch (e) {
        document.getElementById('inventoryList').innerHTML = "<tr><td colspan='3' class='text-center text-danger'>โหลดข้อมูลไม่สำเร็จ</td></tr>";
      }
    }

    window.onload = init;
  </script>
</body>
</html>
