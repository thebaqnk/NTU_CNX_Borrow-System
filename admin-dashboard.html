<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Admin Dashboard - NTU</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    :root { --p-purple: #9d85e1; --soft-bg: #f8f7ff; }
    body { font-family: 'Sarabun', sans-serif; background: var(--soft-bg); padding: 15px; }
    .card-custom { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: none; margin-bottom: 15px; }
    .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .bg-ready { background-color: #28a745; }
    .bg-borrowed { background-color: #dc3545; }
    .table-sm { font-size: 0.85rem; }
    .history-item { border-left: 3px solid var(--p-purple); padding-left: 10px; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="row g-2 mb-3">
      <div class="col-6">
        <div class="card-custom text-center p-3">
          <small class="text-muted">ว่างพร้อมใช้</small>
          <h3 class="fw-bold text-success" id="sumReady">-</h3>
        </div>
      </div>
      <div class="col-6">
        <div class="card-custom text-center p-3">
          <small class="text-muted">กำลังถูกยืม</small>
          <h3 class="fw-bold text-danger" id="sumBorrowed">-</h3>
        </div>
      </div>
    </div>

    <div class="card-custom">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="fw-bold m-0">📋 รายการอุปกรณ์ทั้งหมด</h6>
        <button onclick="loadAdminData()" class="btn btn-sm btn-light text-primary">🔄 รีเฟรช</button>
      </div>
      <div id="inventoryList">
        <div class="text-center p-4">กำลังโหลดข้อมูล...</div>
      </div>
    </div>

    <div class="card-custom">
      <h6 class="fw-bold mb-3">🕒 ประวัติย้อนหลัง 15 รายการ</h6>
      <div class="table-responsive">
        <table class="table table-sm table-hover border-top">
          <tbody id="historyList">
            <tr><td class="text-center py-4">กำลังโหลดประวัติ...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

<script>
  const LIFF_ID = "2009184396-CWSjU5hZ"; 
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwgsV2B-36BDdsiKjFtgHYH_ZVyahwelzJCVi2QiLr7VrzaAZa8TpQGJU7yW3IoD_tPHQ/exec";

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { 
        liff.login(); 
        return; 
      }
      loadAdminData();
    } catch (e) { 
      console.log("LIFF Init Error:", e);
      loadAdminData(); // ให้โหลดข้อมูลต่อเผื่อเทสบนเบราว์เซอร์
    }
  }

  async function loadAdminData() {
    try {
      // เรียกข้อมูลชุดใหญ่ชุดเดียวเพื่อความเร็ว
      const response = await fetch(`${GAS_URL}?action=getAdminHistory`);
      const data = await response.json();

      // 1. อัปเดตยอดรวมด้านบน
      document.getElementById('sumReady').innerText = data.summary.ready;
      document.getElementById('sumBorrowed').innerText = data.summary.borrowed;

      // 2. แสดงรายการอุปกรณ์ปัจจุบัน
      const invContainer = document.getElementById('inventoryList');
      invContainer.innerHTML = "";
      data.items.forEach(item => {
        const isBorrowed = item.status.includes("ยืม");
        invContainer.innerHTML += `
          <div class="d-flex justify-content-between align-items-center mb-2 border-bottom pb-2">
            <div>
              <span class="fw-bold text-dark">${item.id}</span> 
              <small class="text-muted ms-2">${item.room}</small>
            </div>
            <div class="d-flex align-items-center">
              <span class="status-dot ${isBorrowed ? 'bg-borrowed' : 'bg-ready'}"></span>
              <small class="${isBorrowed ? 'text-danger' : 'text-success'}">${item.status}</small>
            </div>
          </div>`;
      });

      // 3. แสดงประวัติย้อนหลัง (เรียงตาม Logs)
      const histContainer = document.getElementById('historyList');
      histContainer.innerHTML = "";
      if(data.history && data.history.length > 0) {
        data.history.forEach(log => {
          const isBorrow = log.action.includes('ยืม');
          histContainer.innerHTML += `
            <tr class="align-middle">
              <td class="text-muted" style="width: 25%">${log.timestamp}</td>
              <td class="fw-bold" style="width: 25%">${log.itemID}</td>
              <td class="${isBorrow ? 'text-danger' : 'text-success'} fw-bold">${log.action}</td>
            </tr>`;
        });
      } else {
        histContainer.innerHTML = "<tr><td class='text-center'>ไม่พบประวัติการทำรายการ</td></tr>";
      }

    } catch (e) {
      console.error("Load Error:", e);
      document.getElementById('inventoryList').innerHTML = "<div class='text-center text-danger'>โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่อีกครั้ง</div>";
    }
  }

  window.onload = init;
</script>
</body>
</html>
