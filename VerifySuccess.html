<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    
    body { background: #f8f7ff; font-family: 'Sarabun', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 20px; }

    .card-success { 
      max-width: 400px; width: 100%; background: white; padding: 40px 20px; 
      border-radius: 28px; box-shadow: 0 15px 35px rgba(157, 133, 225, 0.2); 
      border: 2px solid #e1d9ff; text-align: center; 
    }

    .icon { font-size: 80px; margin-bottom: 20px; display: block; }

    h4 { color: #7a61c5; font-weight: bold; margin-bottom: 25px; }

    p { color: #555; font-size: 1.15rem; line-height: 1.7; margin-bottom: 30px; }

    .highlight-red { color: #d63031; font-weight: bold; text-decoration: underline; }

    .btn-close-ui {
      background: #9d85e1; color: white; border: none; padding: 12px 40px;
      border-radius: 50px; font-weight: bold; transition: 0.3s;
      box-shadow: 0 4px 12px rgba(157, 133, 225, 0.3);
      text-decoration: none; display: inline-block;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card-success">
    <div class="icon">📷</div>
    <h4>เช็คอินจุดคืนสำเร็จ</h4>
    <p>
      ระบบยืนยันตำแหน่งเรียบร้อยแล้ว<br>
      กรุณาปิดหน้าต่างนี้ แล้ว<br>
      <span class="highlight-red">"สแกน QR ที่ตะกร้าอุปกรณ์"</span><br>
      เพื่อยืนยันการคืนอีกครั้งครับ
    </p>
    <a href="https://line.me/R/nv/QRCodeReader" class="btn-close-ui">เปิดกล้องสแกนต่อ</a>
  </div>

  <script>
    // เริ่มทำงาน LIFF เพื่อให้หน้าเว็บรองรับฟีเจอร์ของ LINE
    async function initLiff() {
      try {
        await liff.init({ liffId: "LIFF_ID" }); //Private_URL
      } catch (err) {
        console.error("LIFF Init Error", err);
      }
    }
    initLiff();
  </script>
</body>
</html>
